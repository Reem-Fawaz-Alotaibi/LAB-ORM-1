{% extends 'main/base.html' %}

{% block title %}Add Post | Life Balance{% endblock %}

{% block content %}
<section class="form-section">
    <div class="form-header">
        <span class="hero-badge">Create New Content</span>
        <h1>Add New Post</h1>
        <p>Write a new article for your lifestyle and productivity blog.</p>
    </div>

    <div class="form-box">
        <form method="POST" class="post-form">
            {% csrf_token %}

            <div class="form-group">
                <label for="title">Post Title</label>
                <input type="text" id="title" name="title" maxlength="2048" required>
            </div>

            <div class="form-group">
                <label for="content">Post Content</label>
                <textarea id="content" name="content" rows="10" required></textarea>
            </div>

            <div class="form-check">
                <input type="checkbox" id="is_published" name="is_published" checked>
                <label for="is_published">Published</label>
            </div>

            <button type="submit" class="submit-btn">Publish Post</button>
        </form>
    </div>
</section>
{% endblock %}
